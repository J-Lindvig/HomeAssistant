blueprint:
  name: Light and sensors
  description: Kommer
  domain: automation

  input:
    sensor:
      name: Sensor
      description: The sensor which shall trigger the automation
      selector:
        entity:
          domain: binary_sensor

    light:
      name: Light(s)
      description: Light(s) to operate
      selector:
        target:

    time_after:
      name: Time Start
      description: The earliest time to trigger
      default: "07:00:00"
      selector:
        time:

    time_before:
      name: Time End
      description: The latest time to trigger
      default: "23:30:00"
      selector:
        time:

    time_duration:
      name: Duration of sensor
      description: How long time should pass before trigger
      default: "00:10:00"
      selector:
        time:

    delay_min:
      name: Delay minimum
      description: How short delay
      default: 60
      selector:
        number:
          min: 0
          max: 300
          mode: slider
          step: 10
          unit_of_measurement: "seconds"

    delay_max:
      name: Delay maximum
      description: How long delay
      default: 300
      selector:
        number:
          min: 10
          max: 600
          mode: slider
          step: 10
          unit_of_measurement: "seconds"

mode: single
max_exceeded: silent
variables:
  sensor: !input sensor
  time_after: !input time_after
  time_before: !input time_before
  delay_min: !input delay_min
  delay_max: !input delay_max

trigger:
  - platform: state
    entity_id: !input sensor
    for: !input time_duration

  - platform: time
    at:
      - !input time_after
      - !input time_before

action:

  # - service: persistent_notification.create
  #   data:
  #     title: Debug
  #     notification_id: debug
  #     message: |
  #       {{ trigger.platform }}
  #       delay: {{ delay }}

  - choose:
      # It is a sensor that triggered the automation
      # It is between the specified time window
      - conditions:
          - "{{ trigger.platform == 'state' }}"
          - condition: time
            after: !input time_after
            before: !input time_before
        sequence:
          # Wait to see if the sensor changes state, if not after timeout continue
          - wait_template: "{{ is_state(sensor, 'trigger.from_state.state') }}"
            timeout:
              seconds: "{{ range(delay_min | int, delay_max | int) | random }}"
            continue_on_timeout: true
            # Only perform action if the wait was completed
          - choose:
              - conditions: "{{ not wait.completed }}"
                sequence:
                  - service: "homeassistant.turn_{{ trigger.to_state.state }}"
                    target: !input light

    default:
      # Save some variables
      - variables:
          # State of the sensor
          sensor_state: "{{ states(sensor) }}"
          # What time (HH:MM:SS) was the trigger
          trigger_time: "{{ as_timestamp(trigger.now) | timestamp_custom('%H:%M:%S') }}"
  
      # Wait to see if the sensor changes state
      - wait_template: "{{ is_state(sensor, ( 'off' if sensor_state == 'on' else 'on' )) }}"
        timeout:
          seconds: "{{ range(delay_min | int, delay_max | int) | random }}"
        continue_on_timeout: true
        # Only perform action if the wait was completed
      - choose:
          - conditions: "{{ not wait.completed }}"
            sequence:
              - service: "homeassistant.turn_{{ 'on' if trigger_time == time_after else 'off' }}"
                target: !input light