  - type: custom:layout-card
    layout: grid
    gridrows: 10vh 20vh% 40%
    gridcols: 20% 35.55vh auto 20% 20%
    gridgap: -10px
    cards:
      - type: markdown
        content: |
          # Header
        gridrow: 1
        gridcol: 1 / span 5
        style: "ha-card { height: 100%; }"

      - type: picture-entity
        entity: camera.rat_cam_kokken
        camera_view: live
        show_state: false
        gridrow: 2
        gridcol: 2
        style: "ha-card { height: 100%; }"

      - type: markdown
        content: |
          celle 4
        gridrow: 3
        gridcol: 1 / span 5
        style: "ha-card { height: 100%; }"