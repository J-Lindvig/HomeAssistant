title: Grid
icon: mdi:grid
panel: true
cards:
  - type: vertical-stack
    cards:
      - type: picture-elements
        image: /local/images/backgrounds/blank.png
        aspect_ratio: 5%
        elements:

          - type: state-label
            entity: sensor.time
            style:
              top: 50%
              left: 20px
              #height: 100px
              width: 200px
              text-align: right
              font-size: 2.8em
              color: rgba(202,217,235,1)

      - type: custom:layout-card
        layout: grid
        gridrows: 160px auto 200px
        gridcols: 200px auto 200px
        cards:
          - type: markdown
            content: |
              celle 2
            gridrow: 1
            gridcol: 1
            style: "ha-card { height: 100%; }"
    
          - type: markdown
            content: |
              celle 3
            gridrow: 2
            gridcol: 2
            style: "ha-card { height: 100%; }"
    
          - type: markdown
            content: |
              celle 4
            gridrow: 3
            gridcol: 1 / span 3
            style: "ha-card { height: 100%; }"