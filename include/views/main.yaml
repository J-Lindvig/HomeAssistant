# Layout-Card, https://github.com/thomasloven/lovelace-layout-card

title: Skovtrolden
icon: mdi:home-assistant
panel: true
cards:
  - type: custom:layout-card
    layout: vertical
    column_num: 3
    column_width: 33%
    cards:
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
            - type: picture-entity
              entity: camera.rat_cam_kokken
              camera_view: live
              show_state: false
            - type: picture-entity
              entity: camera.rat_cam_gangen
              camera_view: live
              show_state: false
          - type: horizontal-stack
            cards:
            - type: picture-entity
              entity: camera.rat_cam_badevaerelse
              camera_view: live
              show_state: false
            - type: picture-entity
              entity: camera.rat_cam_stuen
              camera_view: live
              show_state: false
#      - !include cards/main/transport.yaml
#      - !include cards/main/library.yaml
      - !include cards/room_lights/glance.yaml
      - break

      - !include cards/main/people_home.yaml
      - !include cards/main/slides/clock.yaml
      - !include cards/main/slides.yaml
      - !include cards/main/vacuum.yaml
      - break

      - !include cards/main/garbage.yaml
      - !include cards/weather/uv-index.yaml
      - !include cards/weather/brobyvaerk.yaml