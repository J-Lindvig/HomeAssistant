# Layout-Card, https://github.com/thomasloven/lovelace-layout-card

title: Skovtrolden
icon: mdi:home-assistant
panel: true
cards:
  - type: custom:layout-card
    layout: vertical
    min_columns: 1
    max_columns: 3
    min_width: 33%
    cards:
      - type: vertical-stack
        cards:
          - type: picture
            image: /local/images/headers/rotte.jpg
          - type: horizontal-stack
            cards:
              - type: picture-entity
                entity: camera.kitchen
                camera_view: live
                show_state: false
              # - type: picture-entity
              #   entity: camera.bathroom
              #   camera_view: live
              #   show_state: false
          - type: horizontal-stack
            cards:
              - type: picture-entity
                entity: camera.hallway
                camera_view: live
                show_state: false
              - type: picture-entity
                entity: camera.livingroom
                camera_view: live
                show_state: false

#      - !include cards/main/transport.yaml
#      - !include cards/main/library.yaml
      - !include cards/room_lights/glance.yaml
      - break

      - !include cards/main/people_home.yaml
      - !include cards/main/slides/clock.yaml
      - !include cards/main/slides.yaml
      - !include cards/main/vacuum.yaml
      - break

      - !include cards/main/garbage.yaml
      - !include cards/weather/uv-index.yaml
      - !include cards/weather/brobyvaerk.yaml