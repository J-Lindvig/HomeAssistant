flagdays_dk:
############################################################
####                Flagday by J-Lindvig                ####
############################################################

  shell_command:
    flagdays_update: "source /config/shell/flagdays_dk.sh"

  # Placeholder for half mast
  input_boolean:
    private_half_mast:
      name: "Der flages på halvt"

  sensor:
    - platform: template
      sensors:
        # Template for automations and Lovelace card
        next_flag_day:
          # The name of the event
          friendly_name_template: "{{ state_attr('sensor.flagdays_dk','friendly_name') }}"
          unique_id: bfe66582a1354fd2aa15c19a156fa8ca
          value_template: >-
            {%- set days = states('sensor.flagdays_dk') | int %}
            {% if days > 0 %}
              {%- if days > 1 -%}
                om {{ days }} dage
              {% else %}
                i morgen
              {% endif -%}
            {% else %}
              i dag...!!!
            {% endif %}
          icon_template: "{{ state_attr('sensor.flagdays_dk','icon') }}"
          entity_picture_template: "{{ state_attr('sensor.flagdays_dk','entity_picture') }}"
          attribute_templates:
            days: "{{ states('sensor.flagdays_dk') }}"

            flag_up_time: >-
              {% set sunrise_ts = as_timestamp(state_attr('sun.sun', 'next_rising')) | int %}
              {% set sunrise_min = ( sunrise_ts | timestamp_custom('%-H', true) | int * 60 ) + (sunrise_ts | timestamp_custom('%-H', true) | int) %}
              {%- if sunrise_min <= 480 %}
                08:00
              {% else %}
                {{ sunrise_ts | timestamp_custom('%H:%M', true) }}
              {% endif -%}

            flag_down_time: >-
              {{ as_timestamp(state_attr('sun.sun', 'next_setting')) | int | timestamp_custom('%H:%M', true) }}

            half_mast: >-
              {%- if is_state_attr('sensor.flagdays_dk', 'half_mast_all_day', true) %}
                true
              {% elif is_state_attr('sensor.flagdays_dk', 'half_mast_end_time', false) %}
                false
              {% else %}
                {{ state_attr('sensor.flagdays_dk', 'half_mast_end_time') }}
              {% endif %}

  script:
    flagday_notify:
      sequence:
        - service: notify.mobile_app_jacobs_moto
          data:
            title: "{{ title }}"
            message: "{{ message }}"
            data:
              icon_url: /local/images/flags/Denmark.png
              sticky: true
              persistent: true
              tag: persistent
              channel: Flagstang
              importance: high
              actions:
                - action: "flag_toggle"
                  title: "{{ flag_toggle_title }}"
                - action: "flag_cancel"
                  title: "Annuler"

  automation:
    - alias: Opdater flagdage
      id: 2f0253f30f74479b90b5231ec7296d61
      description: Opdater nedtællingen til næste officielle flagdag
      initial_state: true
      mode: single
      trigger:
        - platform: time
          at: "05:00:00"
        - platform: homeassistant
          event: start
      action:
        service: shell_command.flagdays_update

    # It is flagday
    - alias: Flaget skal hejses
      id: 3f6b25440fe54302b3165c2624431d8c
      description: Reminder om at hejse flaget
      initial_state: true
      mode: single
      trigger:
        - platform: template
          value_template: "{{ states('sensor.time') == state_attr('sensor.nex_flag_day', 'flag_up_time') }}"
      condition: "{{ ( state_attr('sensor.nex_flag_day', 'days') | int ) == 0 }}"
      action:

        # Update the boolean switch whether it is a half mast
        - service: >-
            {%- if is_state_attr('sensor.flagdays_dk', 'half_mast_all_day', true) %}
              input_boolean.turn_on
            {% elif is_state_attr('sensor.flagdays_dk', 'half_mast_end_time', false) %}
              input_boolean.turn_off
            {% else %}
              input_boolean.turn_on
            {% endif %}
          data:
            entity_id: input_boolean.private_half_mast

        # Send a actionable notification to my phone
        - service: notify.mobile_app_jacobs_moto
          data:
            title: "Besked fra din flagstang"
            message: >
              Husk at hejse flaget i anledning af {{ state_attr('sensor.nex_flag_day', 'friendly_name') }}.
              {%- if not is_state_attr('sensor.nex_flag_day', 'half_mast', 'false') %}
                HUSK: Flaget skal være på halv {{ 'hele dagen.' if is_state_attr('sensor.nex_flag_day', 'half_mast', 'true') else 'indtil ' + state_attr('sensor.nex_flag_day', 'half_mast') + ' hvorefter det skal hejses til tops.' }}
              {% endif %}
            data:
              icon_url: /local/images/flags/Denmark.png
              sticky: true
              persistent: true
              tag: persistent
              channel: Flagstang
              importance: high
              actions:
                - action: "flag_toggle"
                  title: "OK, flaget er hejst"
                - action: "flag_cancel"
                  title: "Annuler"

    # On a half mast day  with a end time
    - alias: Flaget skal helt til tops
      id: 45b26aec9e45450ebefdc46f7c6be4bd
      description: Reminder om at hejse flaget helt til tops
      initial_state: true
      mode: single
      trigger:
        - platform: template
          value_template: "{{ states('sensor.time') == state_attr('sensor.nex_flag_day', 'half_mast') }}"
      action:

        - service: input_boolean.turn_off
          data:
            entity_id: input_boolean.private_half_mast

        - service: notify.mobile_app_jacobs_moto
          data:
            title: "Besked fra din flagstang"
            message: >
              Det er nu tid til at flaget skal helt til tops.
            data:
              icon_url: /local/images/flags/Denmark.png
              sticky: true
              persistent: true
              tag: persistent
              channel: Flagstang
              importance: high

    # Time to take the flag down
    - alias: Flaget er hejst
      id: 305695924c244ce4a3ddbb4710228135
      description: Reminder om at tage flaget ned
      mode: single
      trigger:
        - platform: sun
          event: sunset
          offset: "-00:10:00"
      action:
        - service: notify.mobile_app_jacobs_moto
          data:
            title: "Besked fra din flagstang"
            message: >
              Husk at tage flaget ned. Solen går ned kl. {{ state_attr('sensor.nex_flag_day', 'flag_down_time') }}.
              {{ 'OBS: Hejs først flaget helt til tops inden det tages ned.' if is_state('input_boolean.private_half_mast', 'on') }}
            data:
              icon_url: /local/images/flags/Denmark.png
              sticky: true
              persistent: true
              tag: persistent
              channel: Flagstang
              importance: high
              actions:
                - action: "flag_toggle"
                  title: "OK, flaget er taget ned"

        - service: input_boolean.turn_off
          data:
            entity_id: input_boolean.private_half_mast

    # Receiver of the actions from the phone
    - alias: Opdater flagets status
      id: 0408a260c8514a17b42ae7c4167217f2
      description: Modtager af kommandoer fra notifikationer
      initial_state: true
      mode: single
      trigger:
        - platform: event
          event_type: mobile_app_notification_action
      action:
        - choose:
          - conditions: "{{ trigger.event.data['action'] == 'flag_toggle' }}"
            sequence:
            - service: automation.toggle
              data:
                entity_id: automation.flaget_er_hejst
          default:
            - service: notify.mobile_app_jacobs_moto
              data:
                message: clear_notification
                data:
                  tag: persistent