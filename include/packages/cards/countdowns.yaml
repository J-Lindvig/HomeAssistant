countdowns:
  anniversaries:
    sensors:
      # Birthdays
      - name: "Jacob fødselsdag"
        date: "1975-03-24"
        id_prefix: "birthday_"
        date_format: "%-d-%-m-%Y"
        unit_of_measurement: "dage"
      - name: Rikke fødselsdag
        date: "1976-10-03"
        id_prefix: "birthday_"
        date_format: "%-d-%-m-%Y"
        unit_of_measurement: "dage"
      - name: Cornelie & Nathalie fødselsdag
        date: "2003-08-22"
        id_prefix: "birthday_"
        date_format: "%-d-%-m-%Y"
        unit_of_measurement: "dage"
      - name: Hjalte fødselsdag
        date: "2007-03-22"
        id_prefix: "birthday_"
        date_format: "%-d-%-m-%Y"
        unit_of_measurement: "dage"
      - name: Emilio fødselsdag
        date: "2014-09-17"
        id_prefix: "birthday_"
        date_format: "%-d-%-m-%Y"
        unit_of_measurement: "dage"
      - name: Colin fødselsdag
        date: "2016-04-23"
        id_prefix: "birthday_"
        date_format: "%-d-%-m-%Y"
        unit_of_measurement: "dage"
      - name: William fødselsdag
        date: "2020-01-18"
        id_prefix: "birthday_"
        date_format: "%-d-%-m-%Y"
        unit_of_measurement: "dage"

      # Anniversaties
      - name: Bryllupsdag
        date: "2003-07-01"
        date_format: "%-d-%-m-%Y"
        unit_of_measurement: "dage"

      # Annual events
      - name: Juleaften
        date: "12-24"
        id_prefix: "annual_"
        date_format: "%-d-%-m-%Y"
        unit_of_measurement: "dage"
      - name: Nytårsaften
        date: "12-31"
        id_prefix: "annual_"
        date_format: "%-d-%-m-%Y"
        unit_of_measurement: "dage"

  group:
    birthdays:
      name: Fødselsdage
      entities:
        - sensor.birthday_jacob_fodselsdag
        - sensor.birthday_rikke_fodselsdag
        - sensor.birthday_cornelie_nathalie_fodselsdag
        - sensor.birthday_hjalte_fodselsdag
        - sensor.birthday_emilio_fodselsdag
        - sensor.birthday_colin_fodselsdag
        - sensor.birthday_william_fodselsdag

  sensor:
    - platform: template
      sensors:
        next_birthday_entity:
          unique_id: cb2d283a24d5492cb75fef508da232d5
          friendly_name: Next Birthday Entity
          value_template: >
            {%- set ns = namespace(entity_id="", prev=1000) -%}
            {% for birthday in state_attr('group.birthdays', 'entity_id') -%}
              {% if states(birthday) | int < ns.prev %}
                {%- set ns.entity_id = birthday -%}
                {%- set ns.prev = states(birthday) | int -%}
              {% endif -%}
            {% endfor -%}
            {{ ns.entity_id }}
        next_birthday:
          unique_id: 3bb6f91db9db486eb0d6be44bc6e3f3e
          friendly_name_template: "{{ state_attr(states('sensor.next_birthday_entity'), 'friendly_name')[:-11] -}}"
          value_template: >-
            {% set days = states(states('sensor.next_birthday_entity')) | int %} 
            {% if days > 0 %}
              {%- if days | int > 1 -%}
                om {{ days }} dage
              {% else %}
                i morgen
              {% endif -%}
            {% else %}
              i dag...!!!
            {% endif -%}
          attribute_templates:
            years_at_next_anniversary: >-
              {% set entity_id = states('sensor.next_birthday_entity') %}
              {% if states(entity_id) | int == 0 -%}
                {{ state_attr(entity_id, "years_at_next_anniversary") - 1 }}
              {% else %}
                {{ state_attr(entity_id, "years_at_next_anniversary") }}
              {% endif %}
            hide_in_list: "true"